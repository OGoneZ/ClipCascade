name: build & push duohub image

# duohub fork 专用 workflow：
# - 每次 push 到 main / 打 tag → 触发
# - 用 Dockerfile.duohub multi-stage build
# - 推到 ghcr.io/<owner>/clipcascade（公开镜像，免费无限带宽）
#
# 用 GITHUB_TOKEN 自动鉴权，不需要额外 PAT/secret。

on:
  push:
    branches: [main, duohub/**]
    tags: ['v*']
    paths:
      - 'ClipCascade_Server/**'
      - '.github/workflows/duohub-image.yml'
  workflow_dispatch:

concurrency:
  group: duohub-image-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/clipcascade

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase image name
        id: lc
        run: echo "name=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.lc.outputs.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ClipCascade_Server/ClipCascade_Backend
          file: ClipCascade_Server/ClipCascade_Backend/Dockerfile.duohub
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
